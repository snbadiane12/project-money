services:
  - type: web
    name: wholesale-deal-finder
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /api/livez
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: COOKIE_SECURE
        value: "true"
